{% extends 'panel.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block titulo %}
    <title> Eliminar médico ? </title>
{% endblock %}

{% block letrero %}
  <h4 class="mb-1 mb-sm-0">¿Realmente desea eliminar el registro {{object}} ?</h4>
{% endblock %}

{% block content %}
<section>
  <div class="row justify-content-center">
    <div class="col-md-8 col-12 grid-margin stretch-card">
      <div class="card">
        <div class="car-body">
                      <form class="form" method="post">
                          <div class="form-group">
                          {% csrf_token %}
                      </div>
                      <div class="form-group">
                          <center>
                              <input type="submit" name="Eliminar" value="Si, eliminar" class="btn btn-danger eliminar">
                              <a  class="btn btn-warning cancelar ml-3" href="{% url 'class_medico_lista' %}">Cancelar</a>
                          </center>
                      </div>
                      </form>
                    </div>
                </div>
              </div>
            </div>
  </section>

  {% endblock %}
